version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orscheduler
      POSTGRES_PASSWORD: orscheduler
      POSTGRES_DB: orscheduler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orscheduler"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
